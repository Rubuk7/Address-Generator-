<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>4 Label PDF</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

.wrap{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#fff;
  padding:20px;
  width:720px;
  border-radius:10px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

textarea{
  width:100%;
  height:110px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:16px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h3>4 Shipping Labels</h3>

<div class="grid">
<textarea id="t1" placeholder="TO Address 1"></textarea>
<textarea id="t2" placeholder="TO Address 2"></textarea>
<textarea id="t3" placeholder="TO Address 3"></textarea>
<textarea id="t4" placeholder="TO Address 4"></textarea>
</div>

<button onclick="makePDF()">Generate PDF</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
/* STABLE FROM ADDRESS */
const FROM =
"FROM:\nRoopac,\n21/12 A,Murugasamy Layout,\nN.R.K.Puram,\nTiruppur.\nPh: +91 99445 00999";

function makePDF(){

const {jsPDF}=window.jspdf;
const doc=new jsPDF({orientation:"landscape"});

let tos=[
document.getElementById("t1").value.trim(),
document.getElementById("t2").value.trim(),
document.getElementById("t3").value.trim(),
document.getElementById("t4").value.trim()
];

const startX=5;
const startY=5;
const boxW=138;
const boxH=95;
const gap=10;

const positions=[
[startX,startY],
[startX+boxW+gap,startY],
[startX,startY+boxH+gap],
[startX+boxW+gap,startY+boxH+gap]
];

doc.setFontSize(11);

positions.forEach((p,i)=>{

let to=tos[i];
if(!to) return;

let x=p[0];
let y=p[1];

doc.rect(x,y,boxW,boxH);

/* TO (Top-right) */
let toText=doc.splitTextToSize("TO:\n"+to,boxW-15);
doc.text(toText,x+boxW-60,y+8);

/* FROM (Bottom-left, fixed padding) */
let fromText=doc.splitTextToSize(FROM,boxW-10);
doc.text(fromText,x+5,y+boxH-25);

});

doc.save("labels.pdf");
}
</script>

</body>
</html>
